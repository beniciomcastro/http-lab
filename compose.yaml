services:
  backend:
    build: ./crud-api
    environment:
      PORT: 80
    ports:
      - "8000:80"
    volumes:
      - ./crud-api/data:/app/data

  frontend:
    build: ./crud-frontend-axios
    environment:
      PORT: 80
      BACKEND_SCHEME: http
      BACKEND_HOST: backend
      BACKEND_PORT: 80
    ports:
      - "8080:80"
    depends_on:
      - backend
